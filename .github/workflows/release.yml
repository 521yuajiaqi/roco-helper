name: Build APK and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建 Web
        run: npm run build

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest 2>/dev/null || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 安装 Android SDK 组件
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: 初始化 Capacitor Android 工程
        run: |
          npx cap add android
          npx cap sync

      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ANDROID_HOME=$HOME/android-sdk ./gradlew assembleDebug --no-daemon

      - name: 查找并重命名 APK
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          APK_PATH=$(find android -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "未找到 APK！"
            find android -name "*.apk" 2>/dev/null || echo "没有 .apk 文件"
            find android/app/build -type f -name "*.apk" 2>/dev/null || echo "app/build 下无 apk"
            exit 1
          fi
          cp "$APK_PATH" roco-helper-${TAG_NAME}.apk
          echo "APK: roco-helper-${TAG_NAME}.apk"

      - name: 创建 Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          files: roco-helper-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
